name: E2E After Merge

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-after-merge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packaged-app-smoke:
    name: Packaged app smoke
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Run .NET unit tests
        run: dotnet test tests/CharacterManager.Core.Tests/CharacterManager.Core.Tests.csproj --configuration Release --logger trx --results-directory TestResults

      - name: Package unpacked Windows app
        working-directory: apps/desktop
        run: npm run package:win:dir

      - name: Upload unpacked app
        uses: actions/upload-artifact@v4
        with:
          name: character-manager-windows-unpacked
          path: apps/desktop/release/win-unpacked/**

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-dotnet-test-results
          path: TestResults/*.trx

